<div x-data="{ initialTrustLevel: {{ trust_level }}, selectedTrustLevel: {{ trust_level }}, isSubmittingTrustLevelUpdate: false }"
     class="flex flex-wrap items-center gap-2">
    <div class="text-sm font-normal bg-base-content/60 bg-clip-text text-transparent">
        Your trust level:
    </div>

    <form method="post"
          action="{% url 'borrowd_groups:update-trust-level' group_id %}"
          @submit="isSubmittingTrustLevelUpdate = true"
          class="flex items-center gap-2">
        {% csrf_token %}
        <div class="relative inline-flex">
            <select name="trust_level"
                    x-model="selectedTrustLevel"
                    class="btn btn-soft btn-xs appearance-none bg-none pl-3 pr-6 font-medium"
                    :class="Number(selectedTrustLevel) === 2 ? 'btn-success' : 'btn-ghost'">
                <option value="1">
                    Standard
                </option>
                <option value="2">
                    High
                </option>
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-3 flex items-center"
                  :class="Number(selectedTrustLevel) === 2 ? 'text-success' : 'text-base-content/60'">
                <svg xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 20 20"
                     fill="none"
                     class="h-3.5 w-3.5"
                     aria-hidden="true">
                    <path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </span>
        </div>

        <div class="flex items-center gap-2 shrink-0">
            <button type="button"
                    onclick="showModal('trust-level-info-modal')"
                    class="inline-flex align-middle cursor-pointer hover:drop-shadow-md transition"
                    aria-label="Show trust level details">
                <span class="inline-flex [&>svg]:w-5 [&>svg]:h-5">
                    {% include "icons/information-circle.svg" %}

                </span>
            </button>

            <button type="submit"
                    x-show="String(selectedTrustLevel) !== String(initialTrustLevel)"
                    :disabled="isSubmittingTrustLevelUpdate"
                    class="btn btn-success btn-soft btn-xs">
                <span x-show="!isSubmittingTrustLevelUpdate">Save</span>
                <span x-show="isSubmittingTrustLevelUpdate">...</span>
            </button>
        </div>
    </form>
</div>
